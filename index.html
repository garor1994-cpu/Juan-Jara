<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Boda</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow-x:hidden; font-family:'Georgia', serif; background:#faf6f0; }

  /* ---------- OVERLAY DEL SOBRE ---------- */
  #envelope-overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    transition: opacity 1.2s ease, visibility 1.2s ease;
  }
  #envelope-overlay.hidden {
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  #envelope-video, #envelope-image {
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
  }
  #envelope-image {
    cursor:pointer;
    display:block;
  }
  #skip-btn {
    position:absolute;
    bottom:24px;
    right:24px;
    background:rgba(255,255,255,0.15);
    color:#fff;
    border:1px solid rgba(255,255,255,0.4);
    padding:8px 16px;
    border-radius:20px;
    font-size:14px;
    cursor:pointer;
    font-family:sans-serif;
  }
  #tap-hint {
    position:absolute;
    bottom:40px;
    color:#fff;
    font-family:sans-serif;
    font-size:14px;
    opacity:0.8;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* ---------- CONTENIDO DE LA INVITACION (debajo del overlay) ---------- */
  #invitation {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 20px;
    opacity:0;
    transform:translateY(20px);
    transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
  }
  #invitation.show {
    opacity:1;
    transform:translateY(0);
  }
  #invitation h1 {
    font-size:2.4rem;
    color:#6b4f3a;
    margin-bottom:10px;
    letter-spacing:2px;
  }
  #invitation h2 {
    font-size:1.2rem;
    color:#a68b6f;
    font-weight:normal;
    margin-bottom:30px;
  }
  #invitation p {
    font-size:1rem;
    color:#444;
    max-width:500px;
    line-height:1.6;
  }
  #invitation .fecha {
    margin-top:24px;
    font-size:1.4rem;
    color:#6b4f3a;
  }
</style>
</head>
<body>

  <!-- ======================================================= -->
  <!-- 1) OVERLAY: PRIMERO SE VE LA IMAGEN DEL SOBRE (cerrado)   -->
  <!--    AL HACER CLICK/TAP SE REPRODUCE EL VIDEO DE APERTURA   -->
  <!-- ======================================================= -->
  <div id="envelope-overlay">

    <!-- Paso A: imagen estática del sobre cerrado -->
    <img id="envelope-image" src="sobre-cerrado.jpg" alt="Sobre de invitación">

    <!-- Paso B: video de apertura (oculto hasta que se hace click) -->
    <video id="envelope-video" src="apertura-sobre.mp4" playsinline style="display:none;"></video>

    <div id="tap-hint">Toca el sobre para abrirlo</div>
    <button id="skip-btn">Saltar ▶</button>
  </div>

  <!-- ======================================================= -->
  <!-- 2) CONTENIDO REAL DE LA INVITACION (ya cargado, oculto)   -->
  <!-- ======================================================= -->
  <div id="invitation">
    <h1>Jara &amp; Juan</h1>
    <h2>¡Nos casamos!</h2>
    <p>
      Con mucha alegría queremos invitarte a celebrar con nosotros
      el día más especial de nuestras vidas. Aquí podrás encontrar
      toda la información sobre la ceremonia, el lugar de la celebración
      y confirmar tu asistencia.
    </p>
    <div class="fecha">12 de septiembre de 2026</div>

    <!-- Aquí puedes seguir añadiendo tus secciones: ubicación, RSVP, galería, etc. -->
  </div>

<script>
  const overlay = document.getElementById('envelope-overlay');
  const envelopeImage = document.getElementById('envelope-image');
  const envelopeVideo = document.getElementById('envelope-video');
  const invitation = document.getElementById('invitation');
  const skipBtn = document.getElementById('skip-btn');
  const tapHint = document.getElementById('tap-hint');

  function revealInvitation() {
    overlay.classList.add('hidden');
    invitation.classList.add('show');
    setTimeout(() => { overlay.style.display = 'none'; }, 1300);
  }

  // Al hacer click/tap sobre la imagen del sobre, se reproduce el video
  envelopeImage.addEventListener('click', () => {
    envelopeImage.style.display = 'none';
    tapHint.style.display = 'none';
    envelopeVideo.style.display = 'block';
    envelopeVideo.play();
  });

  // Cuando el video termina, se revela automáticamente la invitación
  envelopeVideo.addEventListener('ended', revealInvitation);

  // Boton para saltar la animacion directamente
  skipBtn.addEventListener('click', revealInvitation);
</script>

</body>
</html>
